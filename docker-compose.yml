services:
  postgres:
    image: postgres:16-alpine
    container_name: orion_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: orion_password
      POSTGRES_DB: orion_db
    ports:
      - "5432:5432"
    volumes:
      - orion_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion -d orion_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  orion_pgdata:
